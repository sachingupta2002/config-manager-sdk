services:
  postgres:
    image: postgres:16-alpine
    container_name: config-manager-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: config_service
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d config_service"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  config-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: config-manager-app
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8089
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: config_service
      DB_SSLMODE: disable
    ports:
      - "8089:8089"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
